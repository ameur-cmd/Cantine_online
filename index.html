<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leoni Cantine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ===================== AUTH PAGE ===================== -->
<div id="authPage" class="auth-screen">
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" id="loginTabBtn" onclick="toggleAuthTab('login')">Sign In</div>
      <div class="auth-tab" id="registerTabBtn" onclick="toggleAuthTab('register')">Register</div>
    </div>

    <!-- Login -->
    <div id="loginWrapper">
      <form id="loginForm">
        <div class="input-group">
          <label for="loginBadgeId">Badge ID</label>
          <input type="text" id="loginBadgeId" class="input-control" placeholder="e.g. 73309">
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" class="input-control" placeholder="Password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Sign In</button>
      </form>
    </div>

    <!-- Register -->
    <div id="registerWrapper" class="hidden">
      <form id="registerForm">
        <div class="input-group">
          <label for="regFirstName">First Name</label>
          <input type="text" id="regFirstName" class="input-control" placeholder="e.g. Ameur">
        </div>
        <div class="input-group">
          <label for="regLastName">Last Name</label>
          <input type="text" id="regLastName" class="input-control" placeholder="e.g. Ben Salah">
        </div>
        <div class="input-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" class="input-control" placeholder="name@leoni.com">
        </div>
        <div class="input-group">
          <label for="regBadgeId">Badge ID</label>
          <input type="text" id="regBadgeId" class="input-control" placeholder="e.g. 73309">
        </div>
        <div class="input-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" class="input-control" placeholder="Minimum 6 characters">
        </div>
        <div class="input-group">
          <label for="regPlant">Plant</label>
          <select id="regPlant" class="input-control">
            <option value="">Loading plants...</option>
          </select>
        </div>
        <div class="input-group">
          <label for="regPosition">Position</label>
          <input type="text" id="regPosition" class="input-control" placeholder="e.g. Engineer">
        </div>
        <div class="input-group">
          <label for="regOffice">Office Location</label>
          <input type="text" id="regOffice" class="input-control" placeholder="Desk/Room number">
        </div>
        <div class="input-group">
          <label for="regRole">Account Role</label>
          <select id="regRole" class="input-control">
            <option value="employee">Employee</option>
            <option value="cantine">Cantine Manager</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Register Account</button>
      </form>
    </div>
  </div>
</div>

<!-- ===================== EMPLOYEE APP ===================== -->
<div id="employeeApp" class="hidden">
  <div class="navbar">
    <div class="nav-brand">Leoni<span>Cantine</span></div>
    <div class="nav-user">
      <span class="muted">Hi, <span id="employeeWelcomeName"></span></span>
      <button class="btn btn-outline btn-small btn-logout">Sign out</button>
    </div>
  </div>

  <div class="app-container">
    <div class="workspace-grid">
      <div>
        <div class="section-card">
          <div class="section-title"><span>Today's Menu</span></div>

          <div class="plant-selector-bar">
            <div class="input-group" style="margin:0; flex:1;">
              <label for="plantSelect">Plant</label>
              <select id="plantSelect" class="input-control" onchange="onPlantChange()">
                <option value="">Loading plants...</option>
              </select>
            </div>
            <div class="input-group" style="margin:0; flex:1;">
              <label for="daySelect">Day</label>
              <input type="date" id="daySelect" class="input-control">
            </div>
          </div>

          <p id="cantineInfo" class="muted" style="margin-bottom:16px;"></p>

          <div id="menuGridContainer" class="menu-grid"></div>
        </div>
      </div>

      <div>
        <div class="section-card">
          <div class="section-title"><span>Your Order</span></div>

          <div class="data-table-wrapper">
            <table class="data-table">
              <thead>
                <tr><th>Item</th><th>Qty</th><th class="text-right">Total</th></tr>
              </thead>
              <tbody id="cartTableBody">
                <tr><td colspan="3" class="muted text-center">Your cart is empty</td></tr>
              </tbody>
            </table>
          </div>

          <div class="input-group" style="margin-top:16px;">
            <label for="pickupTimeSelect">Pickup Time</label>
            <select id="pickupTimeSelect" class="input-control">
              <option value="18:30">18:30 (Dinner Shift)</option>
              <option value="19:30">19:30 (Dinner Shift)</option>
            </select>
          </div>

          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding-top:16px; border-top:1px solid var(--line);">
            <span class="font-bold">Total</span>
            <span id="cartTotalSummary" class="mono font-bold">0.00 DT</span>
          </div>

          <button class="btn btn-orange" style="width:100%; margin-top:16px;" onclick="submitEmployeeOrder()">Place Order</button>
        </div>

        <!-- ===================== ORDER REVIEW FEEDBACK CARD ===================== -->
        <div id="recentOrdersSection" class="section-card hidden">
          <div class="section-title"><span>Your Recent Orders & Feedback</span></div>

          <div class="review-order-status">
            <span class="status-pill status-completed">✓ Received</span>
          </div>

          <div class="input-group" style="margin-top:20px;">
            <label>Rate This Meal</label>
            <div class="star-rating-container" id="starRatingContainer">
              <span class="star" data-value="1">★</span>
              <span class="star" data-value="2">★</span>
              <span class="star" data-value="3">★</span>
              <span class="star" data-value="4">★</span>
              <span class="star" data-value="5">★</span>
            </div>
          </div>

          <div class="input-group" style="margin-top:16px;">
            <label for="reviewCommentBox">Your Feedback (Optional)</label>
            <textarea id="reviewCommentBox" class="input-control" placeholder="Share your thoughts about this meal..." rows="4" style="resize: vertical;"></textarea>
          </div>

          <button class="btn btn-orange" style="width:100%; margin-top:16px;" onclick="submitSavedOrderFeedback()">Submit Review</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ===================== CANTINE MANAGER APP ===================== -->
<div id="cantineApp" class="hidden">
  <div class="navbar">
    <div class="nav-brand">Leoni<span>Cantine</span> <span class="muted" style="font-size:12px;">· Manager</span></div>
    <div class="nav-user">
      <button class="btn btn-outline btn-small btn-logout">Sign out</button>
    </div>
  </div>

  <div class="app-container">
    <div class="section-card">
      <div class="section-title"><span>Incoming Orders</span></div>
      <div class="data-table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>Ticket</th>
              <th>Employee</th>
              <th>Day</th>
              <th>Pickup</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="cantineOrdersTableBody">
            <tr><td colspan="8" class="text-center muted">Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/employee.js"></script>
<script src="js/cantine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
